<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Mi Nube Go</title>
    <style>
        body { font-family: system-ui, sans-serif; background: #0f172a; color: #f8fafc; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; box-sizing: border-box; }
        .card { background: #1e293b; padding: 2.5rem; border-radius: 24px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.3); width: 100%; max-width: 350px; text-align: center; border: 1px solid #334155; }
        h2 { margin-bottom: 25px; font-weight: 700; }
        input { width: 100%; padding: 15px; margin-bottom: 20px; background: #0f172a; border: 1px solid #334155; border-radius: 12px; box-sizing: border-box; font-size: 16px; color: white; outline: none; }
        button { width: 100%; padding: 15px; background: #3b82f6; color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 16px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>📂 Mi Nube Go</h2>
        <form action="/login" method="post">
            <input type="password" name="password" placeholder="Contraseña" required autofocus>
            <button type="submit">Entrar</button>
        </form>
    </div>
</body>
</html>
