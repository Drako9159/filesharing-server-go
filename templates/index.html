<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Nube Go</title>
    <style>
        :root { 
            --bg: #0f172a; 
            --card: #1e293b; 
            --text: #f8fafc; 
            --text-muted: #94a3b8;
            --primary: #3b82f6;
            --border: #334155;
            --danger: #ef4444;
        }
        body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; box-sizing: border-box; }
        .container { max-width: 700px; margin: 0 auto; }
        
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        h1 { font-size: 1.5rem; margin: 0; }

        .search-box { width: 100%; padding: 12px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; color: white; margin-bottom: 20px; box-sizing: border-box; outline: none; }
        .search-box:focus { border-color: var(--primary); }

        .upload-card { background: var(--card); border-radius: 18px; padding: 25px; border: 1px solid var(--border); margin-bottom: 25px; }
        .upload-design { padding: 20px; border: 2px dashed var(--border); border-radius: 12px; text-align: center; cursor: pointer; position: relative; }
        .upload-design:hover { border-color: var(--primary); }
        #file-input { position: absolute; opacity: 0; inset: 0; cursor: pointer; }
        .btn-up { background: var(--primary); color: white; border: none; padding: 14px; border-radius: 10px; width: 100%; font-weight: 600; margin-top: 15px; cursor: pointer; }

        .file-list { display: flex; flex-direction: column; gap: 12px; }
        .file-item { background: var(--card); padding: 15px; border-radius: 16px; display: flex; align-items: center; justify-content: space-between; border: 1px solid var(--border); }
        .file-info { min-width: 0; flex: 1; margin-right: 10px; }
        .file-name { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; }
        .file-size { font-size: 12px; color: var(--text-muted); }

        .actions { display: flex; gap: 8px; }
        .btn-act { background: #0f172a; border: 1px solid var(--border); border-radius: 10px; padding: 8px; text-decoration: none; cursor: pointer; font-size: 14px; color: white; }
        .btn-del:hover { border-color: var(--danger); background: #450a0a; }

        .p-wrap { display: none; margin-top: 15px; height: 6px; background: #000; border-radius: 10px; overflow: hidden; }
        .p-bar { width: 0%; height: 100%; background: var(--primary); transition: width 0.1s; }

        @media (max-width: 480px) {
            .file-item { flex-direction: column; align-items: stretch; }
            .actions { margin-top: 10px; justify-content: flex-end; }
            .file-name { white-space: normal; word-break: break-all; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📂 Mi Nube Go</h1>
            <a href="/logout" style="color:var(--text-muted); text-decoration:none; font-size:0.8rem; border:1px solid var(--border); padding:5px 10px; border-radius:8px;">Cerrar sesión</a>
        </header>

        <input type="text" id="search" class="search-box" placeholder="Buscar archivo...">

        <div class="upload-card">
            <form id="up-form">
                <div class="upload-design">
                    <input type="file" name="file" id="file-input" required>
                    <span id="label">Haz clic para seleccionar</span>
                </div>
                <button type="submit" class="btn-up">Subir al servidor</button>
            </form>
            <div class="p-wrap" id="p-con"><div class="p-bar" id="p-bar"></div></div>
        </div>

        <div class="file-list">
            {{ range . }}
            <div class="file-item" data-name="{{ .Name }}">
                <div class="file-info">
                    <span class="file-name" title="{{ .Name }}">{{ .Name }}</span>
                    <span class="file-size">{{ .Size }}</span>
                </div>
                <div class="actions">
                    <a href="/download/{{ .Name }}" class="btn-act" download="{{ .Name }}">⬇️</a>
                    <form action="/delete" method="post" style="display:inline;" onsubmit="return confirm('¿Borrar {{ .Name }}?');">
                        <input type="hidden" name="filename" value="{{ .Name }}">
                        <button type="submit" class="btn-act btn-del">🗑️</button>
                    </form>
                </div>
            </div>
            {{ end }}
        </div>
    </div>

    <script>
        // Buscador
        document.getElementById('search').oninput = (e) => {
            const val = e.target.value.toLowerCase();
            document.querySelectorAll('.file-item').forEach(item => {
                item.style.display = item.dataset.name.toLowerCase().includes(val) ? 'flex' : 'none';
            });
        };

        // Subida con progreso
        const form = document.getElementById('up-form');
        const fileIn = document.getElementById('file-input');
        fileIn.onchange = () => { if(fileIn.files[0]) document.getElementById('label').innerText = fileIn.files[0].name; };

        form.onsubmit = (e) => {
            e.preventDefault();
            const fd = new FormData();
            fd.append('file', fileIn.files[0]);
            const xhr = new XMLHttpRequest();
            xhr.open('POST', '/upload', true);
            document.getElementById('p-con').style.display = 'block';
            xhr.upload.onprogress = (e) => {
                if (e.lengthComputable) document.getElementById('p-bar').style.width = (e.loaded/e.total*100)+'%';
            };
            xhr.onload = () => location.reload();
            xhr.send(fd);
        };
    </script>
</body>
</html>
